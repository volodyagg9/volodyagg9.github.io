name: Deploy to GitHub Pages

on:
  # деплой при каждом пуше в main
  push:
    branches: [main]
  # и вручную из вкладки Actions при желании
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# не запускать деплои параллельно
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with Astro
        uses: withastro/action@v3
        # действие само поставит зависимости, соберёт и загрузит артефакт

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
